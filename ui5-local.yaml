specVersion: "4.0"
metadata:
  name: zstylemasterfin.zstylemasterfin
type: application
framework:
  name: SAPUI5
  version: 1.120.14
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.fe.templates
    - name: sap.fe.macros
    - name: sap.ushell
    - name: themelib_sap_bluecrystal
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /sap
            url: https://bibawebdisp.bibaapps.com:50500/
            client: "120"
    - name: sap-fe-mockserver
      beforeMiddleware: fiori-tools-proxy
      configuration:
        service:
          urlBasePath: /sap/opu/odata4/sap/zsb_style_master/srvd/sap/zsd_style_master/0001
          name: ""
          metadataXmlPath: ./webapp/localService/mainService/metadata.xml
          mockdataRootPath: ./webapp/localService/mockdata
          generateMockData: true
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: zstylemasterfin.zstylemasterfin
        ui5Theme: sap_horizon
