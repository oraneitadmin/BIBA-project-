specVersion: "4.0"
metadata:
  name: zstylemasterfin.zstylemasterfin
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /sap
            url: https://bibawebdisp.bibaapps.com:50500/
            client: "120"
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: sap-fe-mockserver
      beforeMiddleware: fiori-tools-proxy
      configuration:
        mountPath: /
        services:
          - urlPath: /sap/opu/odata4/sap/zsb_style_master/srvd/sap/zsd_style_master/0001
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mockdata
            generateMockData: true
            annotations: []
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: zstylemasterfin.zstylemasterfin
        ui5Theme: sap_horizon
